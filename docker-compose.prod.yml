services:
  regis-datasec-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regis-datasec-prod
    ports:
      - "127.0.0.1:3004:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
