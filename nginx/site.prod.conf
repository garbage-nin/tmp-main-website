# Rate limiting zones
limit_req_zone $binary_remote_addr zone=rd_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=rd_api:10m rate=5r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name regis-datasec.com www.regis-datasec.com;

    # Allow ACME challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name regis-datasec.com www.regis-datasec.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/regis-datasec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regis-datasec.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    include /etc/nginx/snippets/security-headers.conf;

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static asset caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3004;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=rd_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default proxy
    location / {
        limit_req zone=rd_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
